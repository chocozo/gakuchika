<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぼくのガクチカ 紡ごう！あなただけの相模ストーリー</title>
    <!-- ライブラリの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #FDFCF0; /* 優しいクリーム色の背景 */
            margin: 0;
            color: #4a5568;
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ボタンのスタイル */
        .btn-primary {
            background-color: #A8D1A3;
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #96C191;
            transform: scale(1.02);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        input::placeholder, textarea::placeholder {
            color: #cbd5e1;
        }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            // 初期値を空（またはプレースホルダー）に設定
            const [result, setResult] = useState({ study1: '　　学', study2: '　　学', reason: '' });
            
            const [quadrants, setQuadrants] = useState({
                topLeft: '', topRight: '', bottomLeft: '', bottomRight: ''
            });
            
            const [questions, setQuestions] = useState({
                activity: '', theme: ''
            });

            const handleQuadrantChange = (key, value) => {
                setQuadrants(prev => ({ ...prev, [key]: value }));
            };

            const handleQuestionChange = (key, value) => {
                setQuestions(prev => ({ ...prev, [key]: value }));
            };

            const resetAll = () => {
                setQuadrants({ topLeft: '', topRight: '', bottomLeft: '', bottomRight: '' });
                setQuestions({ activity: '', theme: '' });
                setResult({ study1: '　　学', study2: '　　学', reason: '' });
                setStep(1);
            };

            // レイアウト確認のため、APIを呼ばずに即座に次へ進む
            const generateAcademicPlan = () => {
                setLoading(true);
                
                // 通信を模した短い遅延のあと、空の状態を維持して表示
                setTimeout(() => {
                    // 入力がある場合はその内容に基づいたダミーを表示、なければ空のまま
                    if (questions.activity || questions.theme) {
                        setResult({
                            study1: "〇〇学",
                            study2: "△△学",
                            reason: "（ここに分析結果の文章が表示されます）"
                        });
                    } else {
                        setResult({
                            study1: "　　学",
                            study2: "　　学",
                            reason: "（ここに問いに対する解説文が表示されます）"
                        });
                    }
                    setStep(3);
                    setLoading(false);
                }, 500);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-8 text-center no-print">
                            <h1 className="text-2xl md:text-3xl font-bold text-[#7B956D] mb-4">
                                ★ ぼくのガクチカ　紡ごう！あなただけの相模ストーリー ★
                            </h1>
                            <div className="flex justify-center gap-4">
                                {[1, 2, 3].map((s) => (
                                    <div key={s} className={`w-8 h-8 rounded-full flex items-center justify-center font-bold border-2 ${step === s ? 'bg-[#A8D1A3] text-white border-[#A8D1A3]' : 'bg-white text-slate-200 border-slate-100'}`}>
                                        {s}
                                    </div>
                                ))}
                            </div>
                        </header>

                        {/* STEP 1: 経験の整理 */}
                        {step === 1 && (
                            <div className="bg-white rounded-2xl shadow-sm border border-[#E2F0D9] overflow-hidden animate-fade-in">
                                <div className="bg-[#E2F0D9] px-6 py-3 font-bold text-[#5A734D]">STEP 1: 経験の整理</div>
                                <div className="p-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-[#EEF4FB] p-4 rounded-xl">
                                            <label className="block text-[#4A90E2] font-bold mb-2">苦労・悩み</label>
                                            <textarea className="w-full h-32 p-3 rounded-lg border-none outline-none resize-none" value={quadrants.topLeft} onChange={(e) => handleQuadrantChange('topLeft', e.target.value)} placeholder="うまくいかなかったことは？" />
                                        </div>
                                        <div className="bg-[#FEF1F2] p-4 rounded-xl">
                                            <label className="block text-[#E05670] font-bold mb-2">楽しい・好き</label>
                                            <textarea className="w-full h-32 p-3 rounded-lg border-none outline-none resize-none" value={quadrants.topRight} onChange={(e) => handleQuadrantChange('topRight', e.target.value)} placeholder="興味関心・夢中になったことは？" />
                                        </div>
                                        <div className="bg-[#F3F4F6] p-4 rounded-xl">
                                            <label className="block text-[#6B7280] font-bold mb-2">苦手・面倒</label>
                                            <textarea className="w-full h-32 p-3 rounded-lg border-none outline-none resize-none" value={quadrants.bottomLeft} onChange={(e) => handleQuadrantChange('bottomLeft', e.target.value)} placeholder="やりたくないことは？" />
                                        </div>
                                        <div className="bg-[#FFF9F2] p-4 rounded-xl">
                                            <label className="block text-[#D97706] font-bold mb-2">やりがい・目標</label>
                                            <textarea className="w-full h-32 p-3 rounded-lg border-none outline-none resize-none" value={quadrants.bottomRight} onChange={(e) => handleQuadrantChange('bottomRight', e.target.value)} placeholder="これからの夢は？" />
                                        </div>
                                    </div>
                                    <div className="mt-6 flex justify-end">
                                        <button onClick={() => setStep(2)} className="btn-primary px-10 py-2 rounded-xl font-bold">次へ</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: 問い */}
                        {step === 2 && (
                            <div className="bg-white rounded-[2rem] shadow-sm p-10 md:p-16 animate-fade-in text-center relative border border-slate-50">
                                <div className="text-xl md:text-2xl leading-[4rem] text-slate-600">
                                    相模高校の <input type="text" className="border-b-2 border-slate-200 outline-none w-48 text-center font-bold text-[#7B956D]" value={questions.activity} onChange={(e) => handleQuestionChange('activity', e.target.value)} placeholder="例：部活動" /> を通じて、
                                    <br />
                                    <div className="inline-block bg-[#F8F9FC] px-8 py-2 rounded-3xl border border-slate-100 mt-4 mb-4">
                                        「 <input type="text" className="border-b-2 border-slate-300 outline-none w-64 md:w-80 text-center font-bold text-[#5A734D]" value={questions.theme} onChange={(e) => handleQuestionChange('theme', e.target.value)} placeholder="例：本当の優しさとは？" /> 」という問いに出会いました。
                                    </div>
                                </div>

                                <div className="mt-12 flex justify-between items-center">
                                    <button onClick={() => setStep(1)} className="text-slate-400 font-bold">戻る</button>
                                    <button onClick={generateAcademicPlan} disabled={loading} className="btn-primary px-12 py-3 rounded-xl font-bold shadow-sm disabled:opacity-50">
                                        {loading ? "表示中..." : "未来を導き出す"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 3: 結果 */}
                        {step === 3 && (
                            <div className="bg-white rounded-[2rem] shadow-sm p-10 md:p-16 animate-fade-in text-center border-4 border-[#F0FAF0]">
                                <div className="text-2xl md:text-3xl leading-relaxed text-slate-700 mb-10">
                                    大学では<br />
                                    <span className="bg-[#FFFCE8] px-4 py-1 rounded-lg font-black text-[#856404] mx-2 border-b-4 border-[#FFE082]">{result.study1}</span>
                                    と
                                    <span className="bg-[#FFFCE8] px-4 py-1 rounded-lg font-black text-[#856404] mx-2 border-b-4 border-[#FFE082]">{result.study2}</span>
                                    を学びたい！
                                </div>
                                <div className="max-w-2xl mx-auto bg-[#F9FBFA] p-8 rounded-3xl text-left border border-[#E6F4EA] mb-12">
                                    <p className="text-slate-600 leading-loose min-h-[100px]">{result.reason}</p>
                                </div>
                                <div className="flex justify-center gap-4 no-print">
                                    <button onClick={resetAll} className="border-2 border-slate-100 text-slate-400 px-8 py-3 rounded-xl font-bold">最初から</button>
                                    <button onClick={() => window.print()} className="bg-[#7B956D] text-white px-12 py-3 rounded-xl font-bold shadow-md">印刷して保存</button>
                                </div>
                            </div>
                        )}

                        <footer className="mt-12 text-center text-slate-300 text-[10px] font-bold tracking-widest no-print">
                            SAGAMIHARA HIGH SCHOOL • CAREER DESIGN APP
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
