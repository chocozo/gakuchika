<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぼくのガクチカ 紡ごう！あなただけの相模ストーリー</title>
    <!-- ブラウザでReactを動かすための設定 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #FDFCF0;
            margin: 0;
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media print { .no-print { display: none; } }
        input::placeholder, textarea::placeholder { color: #cbd5e1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- ここからJavaScript/Reactのコード -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState({ study1: '〇〇学', study2: '〇〇学', reason: '' });
            
            const [quadrants, setQuadrants] = useState({
                topLeft: '', topRight: '', bottomLeft: '', bottomRight: ''
            });
            
            const [questions, setQuestions] = useState({
                activity: '', theme: ''
            });

            const handleQuadrantChange = (key, value) => {
                setQuadrants(prev => ({ ...prev, [key]: value }));
            };

            const handleQuestionChange = (key, value) => {
                setQuestions(prev => ({ ...prev, [key]: value }));
            };

            const resetAll = () => {
                setQuadrants({ topLeft: '', topRight: '', bottomLeft: '', bottomRight: '' });
                setQuestions({ activity: '', theme: '' });
                setStep(1);
                setResult({ study1: '〇〇学', study2: '〇〇学', reason: '' });
            };

            const generateAcademicPlan = async () => {
                if (!questions.activity || !questions.theme) {
                    alert('「活動」と「問い」を入力してください。');
                    return;
                }

                setLoading(true);
                const apiKey = ""; 

                const prompt = `
                    分析して、問いに向き合うために最適な学問分野を2つ提案してください。
                    1. 苦労: ${quadrants.topLeft}
                    2. 楽しい: ${quadrants.topRight}
                    3. 苦手: ${quadrants.bottomLeft}
                    4. やりがい: ${quadrants.bottomRight}
                    問い: 「${questions.activity}」を通じて「${questions.theme}」
                    JSON形式: { "study1": "学問名", "study2": "学問名", "reason": "解説" }
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    const parsed = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    setResult(parsed);
                    setStep(3);
                } catch (error) {
                    console.error(error);
                    alert("エラーが発生しました。");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-8 text-center no-print">
                            <h1 className="text-2xl md:text-3xl font-bold text-[#7B956D] mb-2">
                                ★ ぼくのガクチカ　紡ごう！あなただけの相模ストーリー ★
                            </h1>
                            <div className="flex justify-center gap-4 mt-6">
                                {[1, 2, 3].map((s) => (
                                    <div key={s} className="flex flex-col items-center">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${step === s ? 'bg-[#A8D1A3] text-white' : 'bg-white text-slate-300 border-2 border-slate-100'}`}>
                                            {s}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </header>

                        {step === 1 && (
                            <div className="bg-white/80 rounded-3xl shadow-sm border-4 border-white overflow-hidden animate-fade-in">
                                <div className="bg-[#E2F0D9] p-4 font-bold text-[#5A734D]">STEP 1: 経験の整理</div>
                                <div className="p-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-[#EBF3FF] p-5 rounded-2xl">
                                            <label className="block text-blue-600 font-bold mb-2">苦労・悩み</label>
                                            <textarea className="w-full h-32 p-3 rounded-xl bg-white/60 outline-none" value={quadrants.topLeft} onChange={(e) => handleQuadrantChange('topLeft', e.target.value)} />
                                        </div>
                                        <div className="bg-[#FFF0F3] p-5 rounded-2xl">
                                            <label className="block text-pink-600 font-bold mb-2">楽しい・好き</label>
                                            <textarea className="w-full h-32 p-3 rounded-xl bg-white/60 outline-none" value={quadrants.topRight} onChange={(e) => handleQuadrantChange('topRight', e.target.value)} />
                                        </div>
                                        <div className="bg-[#F5F5F5] p-5 rounded-2xl">
                                            <label className="block text-slate-500 font-bold mb-2">苦手・面倒</label>
                                            <textarea className="w-full h-32 p-3 rounded-xl bg-white/60 outline-none" value={quadrants.bottomLeft} onChange={(e) => handleQuadrantChange('bottomLeft', e.target.value)} />
                                        </div>
                                        <div className="bg-[#FFF7ED] p-5 rounded-2xl">
                                            <label className="block text-orange-600 font-bold mb-2">やりがい・目標</label>
                                            <textarea className="w-full h-32 p-3 rounded-xl bg-white/60 outline-none" value={quadrants.bottomRight} onChange={(e) => handleQuadrantChange('bottomRight', e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="mt-8 flex justify-end">
                                        <button onClick={() => setStep(2)} className="bg-[#A8D1A3] text-white px-10 py-3 rounded-2xl font-bold transition-all transform hover:scale-105">次へ</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="bg-white/80 rounded-3xl shadow-sm border-4 border-white p-10 animate-fade-in">
                                <div className="space-y-12 text-center">
                                    <div className="text-xl">
                                        相模高校の <input type="text" className="border-b-2 border-[#D1CCE0] outline-none w-48 text-center text-[#7D6B9D] font-bold" value={questions.activity} onChange={(e) => handleQuestionChange('activity', e.target.value)} placeholder="例：部活動" /> を通じて、
                                    </div>
                                    <div className="bg-[#F8F7FA] p-8 rounded-[2rem] border-2 border-[#E8E4F0] text-xl">
                                        「 <input type="text" className="border-b-2 border-[#7D6B9D] outline-none w-full max-w-md bg-transparent text-[#5D4E7B] font-bold text-center" value={questions.theme} onChange={(e) => handleQuestionChange('theme', e.target.value)} placeholder="例：本当の優しさとは？" /> 」という問いに出会いました。
                                    </div>
                                    <div className="flex justify-between items-center mt-12">
                                        <button onClick={() => setStep(1)} className="text-slate-400">戻る</button>
                                        <button onClick={generateAcademicPlan} disabled={loading} className="bg-[#A3B7D1] text-white px-10 py-3 rounded-2xl font-bold shadow-sm">
                                            {loading ? "分析中..." : "未来を導き出す"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="bg-white/90 rounded-3xl shadow-sm border-4 border-[#F0FAF0] p-10 text-center animate-fade-in">
                                <div className="text-xl leading-[3rem] text-slate-700 mb-10">
                                    大学では<br />
                                    <span className="bg-[#FFF4B3] px-4 py-1 rounded-lg font-black text-[#856404] mx-2">{result.study1}</span>
                                    と
                                    <span className="bg-[#FFF4B3] px-4 py-1 rounded-lg font-black text-[#856404] mx-2">{result.study2}</span>
                                    を学びたい！
                                </div>
                                <div className="max-w-2xl mx-auto bg-white p-6 rounded-2xl border-2 border-[#E6F4EA] text-left mb-10">
                                    <p className="text-slate-600 text-sm leading-relaxed">{result.reason}</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 no-print">
                                    <button onClick={() => setStep(2)} className="border-2 border-slate-100 text-slate-500 py-3 rounded-2xl font-bold">問いを直す</button>
                                    <button onClick={resetAll} className="border-2 border-rose-100 text-rose-400 py-3 rounded-2xl font-bold">最初から</button>
                                    <button onClick={() => window.print()} className="bg-[#7B956D] text-white py-3 px-6 rounded-2xl font-bold shadow-md">保存・印刷</button>
                                </div>
                            </div>
                        )}
                        <footer className="mt-12 text-center text-slate-300 text-[10px] font-bold tracking-widest no-print">
                            SAGAMIHARA HIGH SCHOOL • CAREER DESIGN APP
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
